<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0715 — Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0a0a0c;
    --panel:     #151417;
    --panel-2:   rgba(21,20,23,0.72);
    --gold:      #e8b24a;
    --gold-dim:  #7a5a24;
    --velvet:    #7a1f2b;
    --text:      #f2efe9;
    --text-dim:  #8f8b86;
    --sprocket:  rgba(242,239,233,0.16);
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html,body{
    height:100%;
    height:100dvh;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    overflow:hidden;
    overscroll-behavior:none;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    padding:max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  }

  /* House lights vignette behind the screen */
  .house{
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(232,178,74,0.06), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(122,31,43,0.10), transparent 55%),
      var(--bg);
    z-index:0;
  }

  .theater{
    position:relative;
    z-index:1;
    width:min(100%, 1180px);
    max-height:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .marquee{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    padding:0 4px;
  }

  .marquee .title{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.08em;
    font-size:clamp(22px, 3vw, 34px);
    color:var(--gold);
    text-shadow:0 0 18px rgba(232,178,74,0.35);
  }

  .marquee .reel-no{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.12em;
    font-size:13px;
    color:var(--text-dim);
  }

  .screen{
    position:relative;
    width:100%;
    background:#000;
    border-radius:6px;
    overflow:hidden;
    box-shadow:
      0 0 0 1px rgba(232,178,74,0.10),
      0 30px 80px -20px rgba(0,0,0,0.8),
      0 0 120px -30px rgba(232,178,74,0.15);
    aspect-ratio:16/9;
  }

  video{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    background:#000;
    cursor:pointer;
    touch-action:manipulation;
  }

  /* subtle screen-edge falloff, like light not quite reaching the corners */
  .screen::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    box-shadow:inset 0 0 120px 30px rgba(0,0,0,0.55);
  }

  /* Center play button */
  .center-play{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.25);
    opacity:1;
    transition:opacity 0.35s ease;
    cursor:pointer;
    touch-action:manipulation;
  }
  .center-play.hidden{
    opacity:0;
    pointer-events:none;
  }
  .center-play svg{
    width:78px; height:78px;
    filter:drop-shadow(0 0 22px rgba(232,178,74,0.55));
  }
  .center-play circle{
    fill:rgba(10,10,12,0.55);
    stroke:var(--gold);
    stroke-width:1.5;
  }
  .center-play path{ fill:var(--gold); }

  /* Buffering spinner */
  .spinner{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .spinner.active{ display:flex; }
  .spinner div{
    width:44px; height:44px;
    border-radius:50%;
    border:2px solid rgba(232,178,74,0.18);
    border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* Controls bar */
  .controls{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:22px 18px 14px;
    background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.45) 55%, transparent 100%);
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:1;
    transform:translateY(0);
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .controls.hidden{
    opacity:0;
    transform:translateY(6px);
    pointer-events:none;
  }

  /* Filmstrip scrubber */
  .scrubber{
    position:relative;
    height:20px;
    display:flex;
    align-items:center;
    cursor:pointer;
    padding:0 1px;
    touch-action:none;
  }
  /* invisible enlarged hit area for easier scrubbing with a finger */
  .scrubber::before{
    content:"";
    position:absolute;
    left:0; right:0;
    top:-10px; bottom:-10px;
  }
  .sprockets{
    position:absolute;
    left:0; right:0;
    top:2px;
    height:4px;
    display:flex;
    justify-content:space-between;
    pointer-events:none;
    padding:0 2px;
  }
  .sprockets span{
    width:4px; height:4px;
    border-radius:1px;
    background:var(--sprocket);
  }
  .sprockets.bottom{ top:auto; bottom:2px; }

  .track{
    position:relative;
    width:100%;
    height:4px;
    margin-top:1px;
    background:rgba(242,239,233,0.14);
    border-radius:2px;
    overflow:visible;
  }
  .buffered{
    position:absolute;
    top:0; left:0; height:100%;
    background:rgba(242,239,233,0.24);
    border-radius:2px;
  }
  .progress{
    position:absolute;
    top:0; left:0; height:100%;
    background:linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius:2px;
  }
  .knob{
    position:absolute;
    top:50%;
    width:12px; height:12px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 10px rgba(232,178,74,0.7);
    transform:translate(-50%,-50%);
    transition:transform 0.15s ease;
  }
  .scrubber:hover .knob{ transform:translate(-50%,-50%) scale(1.2); }

  .row{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }

  .row .spacer{ flex:1; min-width:4px; }

  button.ctrl{
    position:relative;
    background:none;
    border:none;
    color:var(--text);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px;
    opacity:0.88;
    touch-action:manipulation;
    flex-shrink:0;
    transition:opacity 0.15s ease, transform 0.15s ease;
  }
  /* invisible enlarged hit area so small icons still meet a comfortable touch target */
  button.ctrl::before{
    content:"";
    position:absolute;
    inset:-8px;
  }
  button.ctrl:hover{ opacity:1; transform:scale(1.08); color:var(--gold); }
  button.ctrl svg{ width:20px; height:20px; }

  .time{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.05em;
    font-size:15px;
    color:var(--text-dim);
    min-width:104px;
    text-align:center;
    flex-shrink:0;
  }
  .time .now{ color:var(--gold); }

  .volume-wrap{
    display:flex;
    align-items:center;
    gap:8px;
    width:110px;
    flex-shrink:0;
  }
  .vol-track{
    position:relative;
    flex:1;
    height:3px;
    background:rgba(242,239,233,0.14);
    border-radius:2px;
    cursor:pointer;
    touch-action:none;
  }
  .vol-fill{
    position:absolute; top:0; left:0; height:100%;
    background:var(--gold);
    border-radius:2px;
    width:100%;
  }
  .vol-knob{
    position:absolute; top:50%; width:9px; height:9px;
    border-radius:50%; background:var(--gold);
    transform:translate(-50%,-50%);
    left:100%;
  }

  .speed-menu{
    position:relative;
    flex-shrink:0;
  }
  .speed-btn{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.05em;
    font-size:13px;
    color:var(--text-dim);
    background:none;
    border:1px solid rgba(242,239,233,0.2);
    border-radius:4px;
    padding:3px 8px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .speed-btn:hover{ color:var(--gold); border-color:var(--gold); }
  .speed-list{
    position:absolute;
    bottom:calc(100% + 8px);
    right:0;
    background:var(--panel);
    border:1px solid rgba(232,178,74,0.2);
    border-radius:6px;
    overflow:hidden;
    display:none;
    flex-direction:column;
    min-width:64px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
  }
  .speed-list.open{ display:flex; }
  .speed-list button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    padding:7px 12px;
    text-align:left;
    cursor:pointer;
  }
  .speed-list button:hover{ background:rgba(232,178,74,0.12); color:var(--gold); }
  .speed-list button.active{ color:var(--gold); }

  .footer-note{
    text-align:center;
    font-size:11.5px;
    color:var(--text-dim);
    letter-spacing:0.03em;
    padding:2px 4px 0;
  }
  .footer-note kbd{
    font-family:'Inter',sans-serif;
    background:rgba(242,239,233,0.08);
    border:1px solid rgba(242,239,233,0.14);
    border-radius:3px;
    padding:1px 5px;
    font-size:10.5px;
  }

  @media (max-width: 640px){
    .volume-wrap{ display:none; }
    .time{ font-size:13px; min-width:76px; }
    .footer-note{ display:none; }
  }

  @media (max-width: 480px){
    body{ padding:10px; padding:max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
    .theater{ gap:10px; }
    .marquee{ padding:0 2px; }
    .marquee .reel-no{ display:none; }
    .controls{ padding:16px 10px 10px; gap:8px; }
    .row{ gap:8px; }
    button.ctrl{ padding:5px; }
    button.ctrl svg{ width:19px; height:19px; }
    .time{ font-size:12.5px; min-width:64px; }
    .speed-btn{ font-size:12px; padding:3px 6px; }
    .center-play svg{ width:60px; height:60px; }
  }

  @media (max-width: 380px){
    #pipBtn{ display:none; }
    .row{ gap:6px; }
    .time{ min-width:0; }
  }

  @media (max-height: 480px) and (orientation: landscape){
    body{ padding:8px; }
    .theater{ width:min(100%, calc((100dvh - 56px) * 16 / 9)); gap:6px; }
    .marquee{ padding:0 2px; }
    .marquee .title{ font-size:16px; }
    .marquee .reel-no{ display:none; }
    .controls{ padding:10px 10px 8px; gap:6px; }
    .center-play svg{ width:50px; height:50px; }
  }
</style>
</head>
<body>

<div class="house"></div>

<div class="theater">

  <div class="marquee">
    <div class="title">0715 — Now Screening</div>
    <div class="reel-no">REEL 0715</div>
  </div>

  <div class="screen" id="screen">
    <video id="video" src="0715.mp4" preload="metadata" playsinline webkit-playsinline="true"></video>

    <div class="spinner" id="spinner"><div></div></div>

    <div class="center-play" id="centerPlay">
      <svg viewBox="0 0 78 78">
        <circle cx="39" cy="39" r="37"></circle>
        <path d="M31 24 L56 39 L31 54 Z"></path>
      </svg>
    </div>

    <div class="controls" id="controls">

      <div class="scrubber" id="scrubber">
        <div class="sprockets">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="track" id="track">
          <div class="buffered" id="buffered"></div>
          <div class="progress" id="progress"></div>
          <div class="knob" id="knob"></div>
        </div>
        <div class="sprockets bottom">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="row">
        <button class="ctrl" id="playBtn" title="Play/Pause (Space)">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <button class="ctrl" id="muteBtn" title="Mute (M)">
          <svg id="volIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-.77-3.29-2-4.24v8.48c1.23-.95 2-2.47 2-4.24z"/></svg>
        </button>

        <div class="volume-wrap">
          <div class="vol-track" id="volTrack">
            <div class="vol-fill" id="volFill"></div>
            <div class="vol-knob" id="volKnob"></div>
          </div>
        </div>

        <div class="time"><span class="now" id="curTime">0:00</span> / <span id="durTime">0:00</span></div>

        <div class="spacer"></div>

        <div class="speed-menu">
          <button class="speed-btn" id="speedBtn">1x</button>
          <div class="speed-list" id="speedList">
            <button data-speed="0.5">0.5x</button>
            <button data-speed="0.75">0.75x</button>
            <button data-speed="1" class="active">1x</button>
            <button data-speed="1.25">1.25x</button>
            <button data-speed="1.5">1.5x</button>
            <button data-speed="2">2x</button>
          </div>
        </div>

        <button class="ctrl" id="pipBtn" title="Picture-in-picture">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 7H5c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h4v-2H5V9h14v3h2V9c0-1.1-.9-2-2-2zm2 8h-8v6h8v-6z"/></svg>
        </button>

        <button class="ctrl" id="fsBtn" title="Fullscreen (F)">
          <svg id="fsIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>

      <div class="footer-note"><kbd>Space</kbd> play &nbsp; <kbd>←/→</kbd> seek &nbsp; <kbd>↑/↓</kbd> volume &nbsp; <kbd>M</kbd> mute &nbsp; <kbd>F</kbd> fullscreen</div>
    </div>
  </div>
</div>

<script>
(() => {
  const video      = document.getElementById('video');
  const screen     = document.getElementById('screen');
  const controls   = document.getElementById('controls');
  const centerPlay = document.getElementById('centerPlay');
  const spinner    = document.getElementById('spinner');

  const playBtn  = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const muteBtn  = document.getElementById('muteBtn');
  const volIcon  = document.getElementById('volIcon');
  const fsBtn    = document.getElementById('fsBtn');
  const pipBtn   = document.getElementById('pipBtn');

  const scrubber = document.getElementById('scrubber');
  const track    = document.getElementById('track');
  const progress = document.getElementById('progress');
  const buffered = document.getElementById('buffered');
  const knob     = document.getElementById('knob');

  const curTimeEl = document.getElementById('curTime');
  const durTimeEl = document.getElementById('durTime');

  const volTrack = document.getElementById('volTrack');
  const volFill  = document.getElementById('volFill');
  const volKnob  = document.getElementById('volKnob');

  const speedBtn  = document.getElementById('speedBtn');
  const speedList = document.getElementById('speedList');

  const ICON_PLAY  = 'M8 5v14l11-7z';
  const ICON_PAUSE = 'M6 5h4v14H6zM14 5h4v14h-4z';
  const ICON_VOL   = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-.77-3.29-2-4.24v8.48c1.23-.95 2-2.47 2-4.24z"/>';
  const ICON_MUTE  = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M19 12l2.5-2.5-1.4-1.4L17.6 10.6 15.1 8.1l-1.4 1.4L16.2 12l-2.5 2.5 1.4 1.4 2.5-2.5 2.5 2.5 1.4-1.4z"/>';

  const fmt = s => {
    if(!isFinite(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + String(sec).padStart(2,'0');
  };

  function setPlayIcon(isPlaying){
    playIcon.innerHTML = `<path d="${isPlaying ? ICON_PAUSE : ICON_PLAY}"/>`;
  }

  function togglePlay(){
    if(video.paused) video.play(); else video.pause();
  }

  video.addEventListener('play', () => {
    setPlayIcon(true);
    centerPlay.classList.add('hidden');
    scheduleHide();
  });
  video.addEventListener('pause', () => {
    setPlayIcon(false);
    centerPlay.classList.remove('hidden');
    showControls();
  });
  video.addEventListener('waiting', () => spinner.classList.add('active'));
  video.addEventListener('playing', () => spinner.classList.remove('active'));
  video.addEventListener('canplay', () => spinner.classList.remove('active'));

  centerPlay.addEventListener('click', togglePlay);
  video.addEventListener('click', () => {
    // On touch devices there's no mousemove to reveal controls first, so
    // if controls are hidden, treat the first tap as "show controls" rather
    // than an instant pause. Once controls are visible, tapping toggles play.
    if(!video.paused && controls.classList.contains('hidden')){
      showControls();
      scheduleHide();
      return;
    }
    togglePlay();
  });
  playBtn.addEventListener('click', togglePlay);

  video.addEventListener('loadedmetadata', () => {
    durTimeEl.textContent = fmt(video.duration);
    updateVolumeUI();
  });

  video.addEventListener('timeupdate', () => {
    curTimeEl.textContent = fmt(video.currentTime);
    if(video.duration){
      const pct = (video.currentTime / video.duration) * 100;
      progress.style.width = pct + '%';
      knob.style.left = pct + '%';
    }
  });

  video.addEventListener('progress', () => {
    if(video.buffered.length && video.duration){
      const end = video.buffered.end(video.buffered.length - 1);
      buffered.style.width = (end / video.duration * 100) + '%';
    }
  });

  video.addEventListener('ended', () => {
    centerPlay.classList.remove('hidden');
    showControls();
  });

  // Scrubbing
  let scrubbing = false;
  function seekFromEvent(e){
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = Math.min(1, Math.max(0, x / rect.width));
    video.currentTime = pct * (video.duration || 0);
  }
  scrubber.addEventListener('mousedown', e => { scrubbing = true; seekFromEvent(e); });
  window.addEventListener('mousemove', e => { if(scrubbing) seekFromEvent(e); });
  window.addEventListener('mouseup', () => scrubbing = false);
  scrubber.addEventListener('touchstart', e => { scrubbing = true; showControls(); seekFromEvent(e); }, {passive:true});
  scrubber.addEventListener('touchmove', e => { if(scrubbing){ e.preventDefault(); seekFromEvent(e); } }, {passive:false});
  window.addEventListener('touchend', () => { if(scrubbing){ scrubbing = false; scheduleHide(); } });

  // Volume
  function updateVolumeUI(){
    const pct = video.muted ? 0 : video.volume * 100;
    volFill.style.width = pct + '%';
    volKnob.style.left = pct + '%';
    muteBtn.querySelector('svg').innerHTML = (video.muted || video.volume === 0) ? ICON_MUTE : ICON_VOL;
  }
  function setVolumeFromEvent(e){
    const rect = volTrack.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = Math.min(1, Math.max(0, x / rect.width));
    video.volume = pct;
    video.muted = pct === 0;
    updateVolumeUI();
  }
  let volDragging = false;
  volTrack.addEventListener('mousedown', e => { volDragging = true; setVolumeFromEvent(e); });
  window.addEventListener('mousemove', e => { if(volDragging) setVolumeFromEvent(e); });
  window.addEventListener('mouseup', () => volDragging = false);
  volTrack.addEventListener('touchstart', e => { volDragging = true; setVolumeFromEvent(e); }, {passive:true});
  volTrack.addEventListener('touchmove', e => { if(volDragging){ e.preventDefault(); setVolumeFromEvent(e); } }, {passive:false});
  window.addEventListener('touchend', () => { volDragging = false; });
  muteBtn.addEventListener('click', () => { video.muted = !video.muted; updateVolumeUI(); });
  video.volume = 1;
  updateVolumeUI();

  // Speed menu
  speedBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speedList.classList.toggle('open');
  });
  speedList.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const speed = parseFloat(btn.dataset.speed);
      video.playbackRate = speed;
      speedBtn.textContent = speed + 'x';
      speedList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      speedList.classList.remove('open');
    });
  });
  document.addEventListener('click', () => speedList.classList.remove('open'));

  // Fullscreen
  fsBtn.addEventListener('click', () => {
    const isFs = document.fullscreenElement || document.webkitFullscreenElement || video.webkitDisplayingFullscreen;
    if(!isFs){
      if(screen.requestFullscreen){
        screen.requestFullscreen();
      } else if(screen.webkitRequestFullscreen){
        screen.webkitRequestFullscreen();
      } else if(video.webkitEnterFullscreen){
        // iOS Safari: only the <video> itself can go fullscreen
        video.webkitEnterFullscreen();
      }
    } else {
      if(document.exitFullscreen) document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  });

  // Picture-in-picture
  pipBtn.addEventListener('click', async () => {
    try{
      if(document.pictureInPictureElement){
        await document.exitPictureInPicture();
      } else {
        await video.requestPictureInPicture();
      }
    }catch(err){ /* PiP unsupported, ignore */ }
  });

  // Auto-hide controls
  let hideTimer;
  function showControls(){
    controls.classList.remove('hidden');
    screen.style.cursor = 'default';
  }
  function scheduleHide(){
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      if(!video.paused && !scrubbing && !volDragging){
        controls.classList.add('hidden');
        screen.style.cursor = 'none';
      }
    }, 2800);
  }
  screen.addEventListener('mousemove', () => { showControls(); scheduleHide(); });
  screen.addEventListener('mouseleave', () => { if(!video.paused) scheduleHide(); });
  showControls();

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    switch(e.code){
      case 'Space':
        e.preventDefault(); togglePlay(); break;
      case 'ArrowRight':
        video.currentTime = Math.min(video.duration, video.currentTime + 5); showControls(); scheduleHide(); break;
      case 'ArrowLeft':
        video.currentTime = Math.max(0, video.currentTime - 5); showControls(); scheduleHide(); break;
      case 'ArrowUp':
        e.preventDefault(); video.volume = Math.min(1, video.volume + 0.05); video.muted = false; updateVolumeUI(); break;
      case 'ArrowDown':
        e.preventDefault(); video.volume = Math.max(0, video.volume - 0.05); updateVolumeUI(); break;
      case 'KeyM':
        video.muted = !video.muted; updateVolumeUI(); break;
      case 'KeyF':
        fsBtn.click(); break;
    }
  });
})();
</script>

</body>
</html>
